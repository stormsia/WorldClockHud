name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller WorldClockHUD.spec

      - name: Prepare WiX inputs
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $exe = Get-ChildItem -Path dist -Recurse -Filter 'WorldClockHud.exe' -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Write-Host "Executable not found in nested dist; listing dist contents for debugging:"; Get-ChildItem -Path dist -Recurse | ForEach-Object { Write-Host $_.FullName }
            Write-Error "Executable WorldClockHud.exe not found under dist"
            exit 1
          }
          Copy-Item $exe.FullName -Destination (Join-Path $PWD 'dist\WorldClockHud.exe') -Force

      - name: Setup .NET (for WiX)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Accept WiX OSMF EULA
        run: wix eula accept wix7

      - name: Build MSI
        shell: powershell
        run: |
          Push-Location installer
          wix build -acceptEula wix7 WorldClockHud.wxs -o ..\dist\WorldClockHud.msi
          Pop-Location

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WorldClockHud.exe
            dist/WorldClockHud.msi
          draft: false
          generate_release_notes: true
