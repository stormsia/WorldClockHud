name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller WorldClockHUD.spec

      - name: Verify Executable Exists
        shell: powershell
        run: |
          $exePath = "dist\WorldClockHud.exe"
          if (Test-Path $exePath) {
              Write-Host "Отлично! PyInstaller успешно собрал файл: $exePath"
          } else {
              Write-Error "Критическая ошибка: PyInstaller не создал файл $exePath"
              exit 1
          }
      - name: Setup .NET (for WiX)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Accept WiX OSMF EULA
        run: wix eula accept wix7

      - name: Build MSI
        shell: powershell
        run: |
          Push-Location installer
          wix build -acceptEula wix7 WorldClockHud.wxs -o ..\dist\WorldClockHud.msi
          Pop-Location

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/WorldClockHud.exe
            dist/WorldClockHud.msi
          draft: false
          generate_release_notes: true
